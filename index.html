                    <div className="flex flex-col sm:flex-row gap-4">
                      <a 
                        href={CONFIG.WHATSAPP_LINK}
                        target="_blank"
                        className="inline-flex items-center justify-center space-x-3 bg-gold hover:bg-gold-hover text-white px-8 py-4 rounded-full font-bold transition-all transform hover:scale-105 shadow-xl shadow-gold/20"
                      >
                        <Icon name="Phone" className="w-5 h-5" />
                        <span>{t.hero.cta}</span>
                      </a>
                      <a 
                        href="#services"
                        className="inline-flex items-center justify-center space-x-3 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white border border-white/30 px-8 py-4 rounded-full font-bold transition-all"
                      >
                        <span>{t.nav.services}</span>
                        <Icon name="ChevronRight" className="w-5 h-5" />
                      </a>
                    </div>
                  </motion.div>
                </div>
              </section>

              {/* About */}
              <section id="about" className="py-24 bg-primary-light">
                <div className="max-w-7xl mx-auto px-6">
                  <div className="grid md:grid-cols-2 gap-16 items-center">
                    <motion.div
                      initial={{ opacity: 0, x: -50 }}
                      whileInView={{ opacity: 1, x: 0 }}
                      className="relative"
                    >
                      <div className="aspect-[4/5] rounded-2xl overflow-hidden shadow-2xl relative z-10 bg-slate-200">
                        <img 
                          src={CONFIG.IMAGES.about} 
                          alt="Elisiane Pokam Profile" 
                          className="w-full h-full object-cover"
                        />
                      </div>
                      <div className="absolute -bottom-6 -right-6 w-full h-full border-4 border-gold rounded-2xl -z-0"></div>
                    </motion.div>

                    <motion.div
                      initial={{ opacity: 0, x: 50 }}
                      whileInView={{ opacity: 1, x: 0 }}
                      className="text-left"
                    >
                      <h2 className="text-sm font-bold text-gold uppercase tracking-[0.3em] mb-4 uppercase">{t.nav.about}</h2>
                      <h3 className="text-4xl md:text-5xl font-serif font-bold text-primary-dark mb-8 leading-tight">
                        {t.about.title}
                      </h3>
                      <p className="text-lg text-slate-600 leading-relaxed mb-12">
                        {t.about.story}
                      </p>

                      <div className="grid sm:grid-cols-2 gap-8 text-left">
                        {t.about.values.items.map((item, index) => (
                          <div key={index} className="flex space-x-4">
                            <div className="flex-shrink-0 w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center">
                              <Icon name="Star" className="w-6 h-6 text-gold" />
                            </div>
                            <div>
                              <h4 className="font-bold text-primary-dark mb-1">{item.title}</h4>
                              <p className="text-sm text-slate-500">{item.desc}</p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </motion.div>
                  </div>
                </div>
              </section>

              {/* Book */}
              <section id="book" className="py-24 bg-white overflow-hidden">
                <div className="max-w-7xl mx-auto px-6 text-center lg:text-left">
                  <div className="flex flex-col lg:flex-row items-center gap-16">
                    <motion.div 
                      initial={{ opacity: 0, scale: 0.9 }}
                      whileInView={{ opacity: 1, scale: 1 }}
                      className="lg:w-1/2 flex justify-center perspective-[2000px]"
                    >
                      <div className="relative group cursor-pointer">
                        <div className="relative z-10 w-[280px] md:w-[350px] aspect-[2/3] preserve-3d transition-transform duration-700 shadow-2xl rounded-r-lg overflow-hidden flex bg-slate-100">
                          <img 
                            src={CONFIG.IMAGES.book} 
                            alt="Book Cover" 
                            className="w-full h-full object-cover"
                          />
                          <div className="absolute inset-0 bg-gradient-to-r from-black/20 to-transparent"></div>
                        </div>
                        <div className="absolute -top-6 -right-6 bg-gold text-white px-6 py-3 rounded-2xl shadow-xl z-20 font-bold border-4 border-white transform rotate-12 flex items-center space-x-2">
                          <Icon name="Tag" className="w-5 h-5" />
                          <span>{t.book.price}</span>
                        </div>
                      </div>
                    </motion.div>

                    <div className="lg:w-1/2 text-left">
                      <h2 className="text-sm font-bold text-gold uppercase tracking-[0.3em] mb-4 uppercase">{t.nav.book}</h2>
                      <h3 className="text-4xl md:text-5xl font-serif font-bold text-primary-dark mb-4 leading-tight">
                        {t.book.title}
                      </h3>
                      <p className="text-lg font-medium text-gold italic mb-8">{t.book.subtitle}</p>
                      
                      <p className="text-slate-600 leading-relaxed text-lg italic border-l-4 border-gold/20 pl-6 py-2 mb-10">
                        {t.book.description}
                      </p>

                      <button 
                        onClick={() => openOrderModal(t.book.title)}
                        className="inline-flex items-center justify-center space-x-3 bg-primary text-white px-10 py-5 rounded-full font-bold transition-all hover:bg-primary-dark shadow-2xl shadow-primary/30"
                      >
                        <Icon name="Phone" className="w-5 h-5" />
                        <span>{t.book.cta}</span>
                      </button>
                    </div>
                  </div>
                </div>
              </section>

              {/* Services */}
              <section id="services" className="py-24 bg-slate-50">
                <div className="max-w-7xl mx-auto px-6">
                  <div className="text-center mb-20 px-4">
                    <h2 className="text-sm font-bold text-gold uppercase tracking-[0.3em] mb-4 uppercase">{t.nav.services}</h2>
                    <h3 className="text-4xl font-serif font-bold text-primary-dark">{t.services.title}</h3>
                  </div>

                  <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    {t.services.categories.map((service) => {
                      const serviceIcons = {
                        'zoe-clean': 'GlassWater',
                        'zoe-events': 'Calendar',
                        'zoe-beauty': 'Gem',
                        'fashion': 'ShoppingBag',
                      };
                      
                      const serviceImages = {
                        'zoe-clean': CONFIG.IMAGES.soap,
                        'zoe-events': CONFIG.IMAGES.events,
                        'zoe-beauty': CONFIG.IMAGES.beauty,
                        'fashion': CONFIG.IMAGES.fashion,
                      };

                      return (
                        <div
                          key={service.id}
                          className="bg-white rounded-2xl overflow-hidden shadow-lg border border-slate-100 flex flex-col h-full transform transition hover:-translate-y-2 text-left"
                        >
                          <div className="h-48 overflow-hidden relative">
                            <img src={serviceImages[service.id]} className="w-full h-full object-cover" />
                            <div className="absolute top-4 left-4 p-2 bg-white rounded-lg shadow-sm">
                              <Icon name={serviceIcons[service.id]} className="w-6 h-6 text-primary" />
                            </div>
                          </div>
                          <div className="p-6 flex flex-col flex-grow">
                            <h4 className="text-xl font-bold text-primary-dark mb-2">{service.title}</h4>
                            <p className="text-sm text-slate-500 mb-4 h-10 overflow-hidden">{service.description}</p>
                            <div className="space-y-2 mb-8">
                              {service.benefits.map((benefit, bIdx) => (
                                <div key={bIdx} className="flex items-center space-x-2 text-xs font-medium text-slate-700">
                                  <Icon name="CheckCircle2" className="w-3.5 h-3.5 text-gold" />
                                  <span>{benefit}</span>
                                </div>
                              ))}
                            </div>
                            <button 
                              onClick={() => openOrderModal(service.title)}
                              className="mt-auto bg-primary hover:bg-primary-dark text-white text-sm font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center space-x-2 shadow-lg shadow-primary/20"
                            >
                              <Icon name="Phone" className="w-4 h-4" />
                              <span>{service.cta}</span>
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </section>

              {/* Contact */}
              <section id="contact" className="py-24 bg-primary text-white">
                <div className="max-w-7xl mx-auto px-6">
                  <div className="grid md:grid-cols-2 gap-16">
                    <div className="text-left">
                      <h2 className="text-sm font-bold text-gold uppercase tracking-[0.3em] mb-6">{t.contact.title}</h2>
                      <h3 className="text-4xl font-serif font-bold mb-8 leading-tight">
                        {lang === 'en' ? "Let's build something beautiful together." : "Construisons quelque chose de beau ensemble."}
                      </h3>
                      
                      <div className="space-y-8">
                        <div className="flex items-center space-x-6">
                          <div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center border border-white/10">
                            <Icon name="Mail" className="w-6 h-6 text-gold" />
                          </div>
                          <div>
                            <p className="text-xs font-bold text-white/50 uppercase tracking-wider mb-1">Email</p>
                            <p className="text-xl font-medium">{t.contact.email}</p>
                          </div>
                        </div>

                        <div className="flex items-center space-x-6">
                          <div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center border border-white/10">
                            <Icon name="MapPin" className="w-6 h-6 text-gold" />
                          </div>
                          <div>
                            <p className="text-xs font-bold text-white/50 uppercase tracking-wider mb-1">Location</p>
                            <p className="text-xl font-medium">Yaoundé, Cameroun</p>
                          </div>
                        </div>

                        <a 
                          href={CONFIG.WHATSAPP_LINK}
                          target="_blank"
                          className="inline-flex items-center space-x-3 bg-gold hover:bg-gold-hover text-white px-8 py-4 rounded-full font-bold transition-all shadow-xl"
                        >
                          <Icon name="Phone" className="w-5 h-5" />
                          <span>{t.contact.whatsapp}</span>
                        </a>
                      </div>
                    </div>

                    <div className="bg-white rounded-3xl p-8 shadow-2xl text-slate-800 text-left">
                      <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                        <div>
                          <label className="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wider">{t.contact.form.name}</label>
                          <input type="text" className="w-full px-4 py-3 rounded-xl border border-slate-200" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wider">{t.contact.form.email}</label>
                          <input type="email" className="w-full px-4 py-3 rounded-xl border border-slate-200" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wider">{t.contact.form.message}</label>
                          <textarea rows="4" className="w-full px-4 py-3 rounded-xl border border-slate-200 resize-none"></textarea>
                        </div>
                        <button className="w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-primary-dark transition-all">
                          {t.contact.form.submit}
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
              </section>

              {/* Footer */}
              <footer className="py-12 bg-primary-dark text-white flex flex-col items-center px-6">
                <div className="font-serif text-2xl font-bold mb-4">
                  Elisiane <span className="text-gold">Pokam</span>
                </div>
                <p className="text-white/60 text-sm mb-8 max-w-sm text-center">{t.footer.message}</p>
                <div className="text-white/40 text-[10px] text-center border-t border-white/5 pt-8 w-full max-w-7xl">
                  © {new Date().getFullYear()} {t.hero.name}. {t.footer.rights}
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
